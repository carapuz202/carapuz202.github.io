<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Погода в Україні — Повний метеосайт</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f0f4f8;--card:#fff;--primary:#2563eb;--primary-d:#1d4ed8;--text:#1e293b;
--text2:#475569;--text3:#94a3b8;--border:#e2e8f0;--hover:#f8fafc;--red:#ef4444;
--green:#22c55e;--orange:#f97316;--blue:#3b82f6;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 40%,#2563eb 100%);color:#fff;padding:2rem 1rem;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 70%);animation:pulse 8s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.header h1{font-size:2.2rem;margin-bottom:.3rem;position:relative}.header p{opacity:.8;font-size:1rem;position:relative}
.container{max-width:1000px;margin:0 auto;padding:0 1rem 2rem}

/* City Selector */
.city-card{background:var(--card);border-radius:var(--radius);padding:1rem 1.2rem;margin-top:-1.5rem;position:relative;z-index:50;
box-shadow:0 8px 30px rgba(0,0,0,.12);display:flex;gap:.8rem;align-items:center;flex-wrap:wrap}
.city-card label{font-weight:700;font-size:1rem;white-space:nowrap}
.search-wrap{flex:1;min-width:200px;position:relative}
#citySearch{width:100%;padding:.6rem .9rem .6rem 2.2rem;border:2px solid var(--border);border-radius:10px;font-size:.95rem;background:var(--hover)}
#citySearch:focus{outline:none;border-color:var(--primary)}
.search-wrap::before{content:'🔍';position:absolute;left:.7rem;top:50%;transform:translateY(-50%);font-size:.9rem}
.dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);border:2px solid var(--border);border-top:none;
border-radius:0 0 10px 10px;max-height:350px;overflow-y:auto;display:none;z-index:100;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.dropdown.open{display:block}
.dd-group{padding:.3rem .7rem;font-size:.75rem;font-weight:700;color:var(--primary);background:#eff6ff;position:sticky;top:0}
.dd-item{padding:.5rem .9rem;cursor:pointer;font-size:.9rem;transition:.15s}
.dd-item:hover,.dd-item.hl{background:#eff6ff;color:var(--primary)}
.dd-item.selected{background:var(--primary);color:#fff}
.city-info{display:flex;gap:.3rem;align-items:center;color:var(--text3);font-size:.82rem}

/* Tabs */
.tabs{display:flex;gap:.3rem;margin-top:1.2rem;flex-wrap:wrap}
.tab-btn{padding:.65rem 1.1rem;border:none;background:var(--border);border-radius:10px 10px 0 0;font-size:.9rem;font-weight:600;
cursor:pointer;color:var(--text3);transition:.2s}
.tab-btn:hover{background:#cbd5e1;color:var(--text)}
.tab-btn.active{background:var(--card);color:var(--primary);box-shadow:0 -2px 8px rgba(0,0,0,.05)}

/* Panels */
.panel{background:var(--card);border-radius:0 var(--radius) var(--radius) var(--radius);padding:1.5rem;
box-shadow:0 6px 24px rgba(0,0,0,.07);display:none;min-height:200px}
.panel.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Current */
.cur{text-align:center;padding:.5rem 0}
.cur-icon{font-size:4.5rem;margin-bottom:.3rem}
.cur-temp{font-size:3.5rem;font-weight:800;letter-spacing:-2px}
.cur-desc{font-size:1.1rem;color:var(--text3);margin-bottom:1rem}
.details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.6rem;margin-bottom:1.2rem}
.det{background:var(--hover);border-radius:10px;padding:.7rem;text-align:center}
.det-icon{font-size:1.3rem}.det-label{font-size:.72rem;color:var(--text3);margin:.1rem 0}.det-val{font-size:1rem;font-weight:700}
.chart-box{background:var(--hover);border-radius:12px;padding:1rem;margin-bottom:1rem}
.chart-box h3{font-size:.95rem;color:var(--text2);margin-bottom:.7rem}
.chart-box canvas{max-height:220px}

/* Forecast */
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.6rem;margin-bottom:1rem}
.fc{background:linear-gradient(135deg,#f8fafc,#eff6ff);border-radius:12px;padding:.7rem;text-align:center;cursor:pointer;
transition:.2s;border:2px solid transparent}
.fc:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.fc.sel{border-color:var(--primary);background:linear-gradient(135deg,#dbeafe,#eff6ff)}
.fc-date{font-size:.72rem;color:var(--text2);font-weight:600;margin-bottom:.3rem}
.fc-icon{font-size:2rem;margin:.1rem 0}.fc-hi{font-weight:800;font-size:1rem}.fc-lo{color:var(--text3);font-size:.85rem}
.fc-rain{font-size:.7rem;color:var(--blue);margin-top:.15rem}
.day-detail{background:var(--hover);border-radius:12px;padding:1.2rem;margin-top:.5rem;animation:fadeUp .3s}
.day-detail h3{font-size:1.1rem;color:var(--text2);margin-bottom:1rem;text-align:center}
.day-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.6rem;margin-bottom:1rem}
.ds{background:var(--card);border-radius:10px;padding:.6rem;text-align:center}
.ds-l{font-size:.72rem;color:var(--text3)}.ds-v{font-size:1rem;font-weight:700}
.hourly-tbl{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:1rem}
table{width:100%;border-collapse:collapse}
th,td{padding:.45rem .5rem;text-align:center;border-bottom:1px solid #f1f5f9;font-size:.82rem}
th{background:var(--hover);font-weight:700;color:var(--text2);position:sticky;top:0;z-index:2}
tbody tr:hover{background:#fafbfe}

/* History */
.ctrl-bar{display:flex;gap:.7rem;flex-wrap:wrap;align-items:end;margin-bottom:1rem}
.fg{display:flex;flex-direction:column;gap:.15rem}
.fg label{font-size:.78rem;font-weight:600;color:var(--text2)}
.fg input,.fg select{padding:.5rem .7rem;border:2px solid var(--border);border-radius:8px;font-size:.9rem}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--primary)}
.btn{padding:.55rem 1.2rem;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.9rem;
font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.btn:hover{background:var(--primary-d);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.summary{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem}
.sm{background:var(--hover);border-radius:10px;padding:.6rem .8rem;flex:1;min-width:80px;text-align:center}
.sm-l{font-size:.7rem;color:var(--text3)}.sm-v{font-size:1.1rem;font-weight:700}

/* Prediction */
.pred-main{text-align:center;background:linear-gradient(135deg,#faf5ff,#eff6ff);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.pred-main .p-icon{font-size:3.8rem}.pred-main .p-temp{font-size:2.6rem;font-weight:800}
.pred-main .p-desc{color:var(--text2);font-size:1rem;margin:.2rem 0}
.pred-main .p-range{color:var(--text3);font-size:.85rem}
.badge{display:inline-block;color:#fff;padding:.25rem .8rem;border-radius:20px;font-size:.82rem;font-weight:600;margin-top:.5rem}
.pred-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.7rem;margin-bottom:1rem}
.pg{background:var(--hover);border-radius:10px;padding:.9rem}
.pg h4{color:var(--text2);margin-bottom:.3rem;font-size:.9rem}
.pg p{color:var(--text3);font-size:.85rem;margin:.1rem 0}
.comp{margin-top:1rem;padding:1rem;background:var(--hover);border-radius:12px}
.comp h3{margin-bottom:.6rem;font-size:1rem;color:var(--text2)}
.comp-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.comp-card{text-align:center;padding:.8rem;background:var(--card);border-radius:10px}
.comp-card h4{font-size:.8rem;color:var(--text3);margin-bottom:.2rem}
.note{margin-top:1rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:.9rem;font-size:.82rem;color:#92400e;line-height:1.5}

/* Loading / Error */
.loading{text-align:center;padding:2rem;color:var(--text3)}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:#fef2f2;color:#dc2626;padding:.9rem;border-radius:8px;border:1px solid #fecaca;font-size:.9rem}

.footer{text-align:center;padding:1.2rem;color:var(--text3);font-size:.8rem}
.footer a{color:var(--blue);text-decoration:none}

@media(max-width:600px){
.header h1{font-size:1.5rem}.cur-temp{font-size:2.6rem}.tab-btn{padding:.45rem .7rem;font-size:.8rem}
.panel{padding:1rem}.fc-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
.comp-row{grid-template-columns:1fr}.pred-grid{grid-template-columns:1fr}
.city-card{flex-direction:column;align-items:stretch}.city-card label{text-align:center}
}
</style>
</head>

<div class="ctrl-bar">

<button class="btn" id="btnP">🔮 Передбачити</button>
</div>
<div id="pOut"></div>
</div>
</div>

<div class="footer">
Дані: <a href="https://open-meteo.com/" target="_blank">Open-Meteo.com</a> — безкоштовний API без ключа · Передбачення — статистика, не офіційний прогноз
</div>

const iso=d=>d.toISOString().slice(0,10);
const r1=n=>Math.round(n*10)/10;
function fD(s){const d=new Date(s+'T00:00');return `${d.getDate()} ${MOF[d.getMonth()]}`}
function fDF(s){const d=new Date(s+'T00:00');return `${d.getDate()} ${MOF[d.getMonth()]} ${d.getFullYear()}`}
function fDay(s){const d=new Date(s+'T00:00');return `${DN[d.getDay()]}, ${d.getDate()} ${MO[d.getMonth()]}`}
function wDir(deg){return['Пн','ПнСх','Сх','ПдСх','Пд','ПдЗх','Зх','ПнЗх'][Math.round(deg/45)%8]}

function mkChart(id,cfg){
  if(charts[id]){charts[id].destroy();delete charts[id]}
  const cv=document.getElementById(id);if(!cv)return null;
  charts[id]=new Chart(cv.getContext('2d'),cfg);return charts[id];
}

/* ═══════════ CITY SEARCH ═══════════ */
function buildDropdown(filter=''){
  const dd=$('cityDropdown');
  let h='';const fl=filter.toLowerCase();
  REGIONS.forEach(([rn,cs])=>{
    const matched=cs.filter(([n])=>n.toLowerCase().includes(fl));
    if(!matched.length)return;
    h+=`<div class="dd-group">${rn} (${matched.length})</div>`;
    matched.forEach(([n])=>{
      const idx=CITIES.findIndex(c=>c.name===n&&c.region===rn);
      const sel=city&&city.name===n&&city.region===rn?' selected':'';
      h+=`<div class="dd-item${sel}" data-i="${idx}">${n}</div>`;
    });
  });
  if(!h)h='<div style="padding:1rem;text-align:center;color:var(--text3)">Нічого не знайдено</div>';
  dd.innerHTML=h;
  dd.querySelectorAll('.dd-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const c=CITIES[+el.dataset.i];
      selectCity(c);
      dd.classList.remove('open');
      $('citySearch').value=c.name;
    });
  });
}

function selectCity(c){
  city=c;
  $('citySearch').value=c.name;
  $('cityInfo').innerHTML=`📍 ${c.region} · ${c.lat.toFixed(2)}°N, ${c.lon.toFixed(2)}°E`;
  fcHourly=null;fcDaily=null;
  loadTab();
}

/* ═══════════ TABS ═══════════ */
function switchTab(t){
  tab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+t));
  loadTab();
}

function loadTab(){
  if(tab==='current')loadCurrent();
  else if(tab==='forecast')loadForecast();
}

/* ═══════════ HISTORY ═══════════ */
async function loadHistory(){
  const el=$('hOut'),s=$('hS').value,e=$('hE').value;
  if(!s||!e){showE(el,'Оберіть дати.');return}
  if(s>e){showE(el,'Початок має бути раніше кінця.');return}
  showL(el);
  try{
    const d=await api(`https://archive-api.open-meteo.com/v1/archive?latitude=${city.lat}&longitude=${city.lon}`+
      `&start_date=${s}&end_date=${e}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,et0_fao_evapotranspiration&timezone=auto`);
    renderHistory(d,el);
  }catch(e){showE(el,'Помилка. Архів доступний до вчора. Спробуйте інший діапазон.')}
}

function renderHistory(data,el){
  const dl=data.daily;
  if(!dl||!dl.time||!dl.time.length){showE(el,'Немає даних.');return}
  const tmx=dl.temperature_2m_max,tmn=dl.temperature_2m_min,prc=dl.precipitation_sum,wnd=dl.wind_speed_10m_max;
  const vMx=tmx.filter(v=>v!=null),vMn=tmn.filter(v=>v!=null),vP=prc.filter(v=>v!=null);
  const avg=a=>r1(a.reduce((s,v)=>s+v,0)/a.length);

  let h=`<div class="summary">
<div class="sm"><div class="sm-l">Сер. макс</div><div class="sm-v">${avg(vMx)}°</div></div>
<div class="sm"><div class="sm-l">Сер. мін</div><div class="sm-v">${avg(vMn)}°</div></div>
<div class="sm"><div class="sm-l">Рекорд ↑</div><div class="sm-v">${r1(Math.max(...vMx))}°</div></div>
<div class="sm"><div class="sm-l">Рекорд ↓</div><div class="sm-v">${r1(Math.min(...vMn))}°</div></div>
<div class="sm"><div class="sm-l">Σ Опадів</div><div class="sm-v">${r1(vP.reduce((a,b)=>a+b,0))} мм</div></div>
<div class="sm"><div class="sm-l">Днів</div><div class="sm-v">${dl.time.length}</div></div>
</div>`;

  h+=`<div class="chart-box"><h3>🌡️ Температура</h3><canvas id="chHTemp"></canvas></div>`;

  for(let i=0;i<dl.time.length;i++){

<td>${prc[i]!=null?prc[i]+' мм':'—'}</td><td>${wnd[i]!=null?wnd[i]+' км/г':'—'}</td></tr>`;
  }

}

/* ═══════════ PREDICTION ═══════════ */
function linReg(x,y){
  const n=x.length,sx=x.reduce((a,b)=>a+b,0),sy=y.reduce((a,b)=>a+b,0);
  const sxy=x.reduce((s,xi,i)=>s+xi*y[i],0),sx2=x.reduce((s,xi)=>s+xi*xi,0);
  const den=n*sx2-sx*sx;
  if(!den)return{slope:0,intercept:sy/n};
  const slope=(n*sxy-sx*sy)/den;
  return{slope,intercept:(sy-slope*sx)/n};
}
function sd(a){const m=a.reduce((s,v)=>s+v,0)/a.length;return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length)}

async function loadPrediction(){
  const el=$('pOut'),ds=$('pD').value;
  if(!ds){showE(el,'Оберіть дату.');return}
  showL(el);
  try{
    const target=new Date(ds+'T00:00'),mo=target.getMonth()+1,day=target.getDate(),tY=target.getFullYear();
    const now=new Date(),cY=now.getFullYear();
    const years=[];for(let y=cY-5;y<=cY-1;y++)years.push(y);
    const pad=n=>String(n).padStart(2,'0');

    const promises=years.map(y=>{
      const c=new Date(y,mo-1,day);
      const s=new Date(c);s.setDate(s.getDate()-7);
      const e=new Date(c);e.setDate(e.getDate()+7);
      return api(`https://archive-api.open-meteo.com/v1/archive?latitude=${city.lat}&longitude=${city.lon}`+
        `&start_date=${iso(s)}&end_date=${iso(e)}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=auto`)
        .then(d=>({year:y,data:d})).catch(()=>null);
    });

    let fcData=null;
    const diff=Math.ceil((target-now)/(864e5));
    if(diff>=0&&diff<=14){
      try{
        const fc=await api(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}`+
          `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto&forecast_days=15`);
        const idx=fc.daily.time.indexOf(ds);
        if(idx>=0)fcData={tmax:fc.daily.temperature_2m_max[idx],tmin:fc.daily.temperature_2m_min[idx],
          precip:fc.daily.precipitation_sum[idx],code:fc.daily.weather_code[idx]};
      }catch(e){}
    }

    const results=(await Promise.all(promises)).filter(Boolean);
    if(!results.length){showE(el,'Недостатньо даних.');return}

    const pred=calcPred(results,mo,day,tY);
    renderPrediction(pred,fcData,ds,el,results);
  }catch(e){showE(el,'Помилка розрахунку.')}
}

function calcPred(results,mo,day,tY){
  const pad=n=>String(n).padStart(2,'0');
  const yearly=results.map(({year,data})=>{
    const dl=data.daily,target=`${year}-${pad(mo)}-${pad(day)}`;
    let wmx=0,wmn=0,wpr=0,wwd=0,tw=0,wdw=0;
    // Also collect daily data for charts
    const days=[];
    for(let i=0;i<dl.time.length;i++){
      const diff=Math.abs(new Date(dl.time[i]+'T00:00')-new Date(target+'T00:00'))/(864e5);
      const w=Math.max(0,1-diff/8);
      if(w>0&&dl.temperature_2m_max[i]!=null){
        tw+=w;wmx+=dl.temperature_2m_max[i]*w;wmn+=dl.temperature_2m_min[i]*w;
        wpr+=(dl.precipitation_sum[i]||0)*w;
        if(dl.wind_speed_10m_max[i]!=null){wwd+=dl.wind_speed_10m_max[i]*w;wdw+=w;}
      }
      days.push({date:dl.time[i],tmax:dl.temperature_2m_max[i],tmin:dl.temperature_2m_min[i],
        precip:dl.precipitation_sum[i],offset:Math.round((new Date(dl.time[i]+'T00:00')-new Date(target+'T00:00'))/(864e5))});
    }
    if(!tw)return null;
    return{year,tmax:wmx/tw,tmin:wmn/tw,precip:wpr/tw,wind:wdw?wwd/wdw:null,days};
  }).filter(Boolean);
  if(!yearly.length)throw new Error('no data');

  const n=yearly.length;
  let TW=0,sm=0,sn=0,sp=0,sw=0,sww=0;
  yearly.forEach((d,i)=>{const w=i+1;TW+=w;sm+=d.tmax*w;sn+=d.tmin*w;sp+=d.precip*w;if(d.wind!=null){sw+=d.wind*w;sww+=w;}});
  const bMax=sm/TW,bMin=sn/TW,bPrecip=sp/TW,bWind=sww?sw/sww:null;

  const yrs=yearly.map(d=>d.year),tmxA=yearly.map(d=>d.tmax),tmnA=yearly.map(d=>d.tmin);
  const trMax=linReg(yrs,tmxA),trMin=linReg(yrs,tmnA);
  const adj=tY-yearly[yearly.length-1].year;
  const pMax=bMax+trMax.slope*adj,pMin=bMin+trMin.slope*adj;

  const sdMx=sd(tmxA),sdMn=sd(tmnA),avgSd=(sdMx+sdMn)/2;
  let conf;
  if(avgSd<2)conf={t:'Висока',c:'#16a34a'};
  else if(avgSd<4)conf={t:'Середня',c:'#ca8a04'};
  else conf={t:'Низька',c:'#dc2626'};

  const rainy=yearly.filter(d=>d.precip>1).length;
  const rainProb=Math.round(rainy/yearly.length*100);

  let code;
  if(bPrecip>8)code=pMax<0?75:65;
  else if(bPrecip>3)code=pMax<0?73:63;
  else if(bPrecip>.5)code=pMax<0?71:61;
  else if(bPrecip>.1)code=3;
  else code=mo>=5&&mo<=9?1:2;

  return{tmax:r1(pMax),tmin:r1(pMin),precip:r1(bPrecip),wind:bWind!=null?r1(bWind):null,
    code,conf,rainProb,trend:{max:r1(trMax.slope),min:r1(trMin.slope)},
    sd:{max:r1(sdMx),min:r1(sdMn)},yearly,
    range:{max:[r1(Math.min(...tmxA)),r1(Math.max(...tmxA))],min:[r1(Math.min(...tmnA)),r1(Math.max(...tmnA))]},
    trMax,trMin};
}

function renderPrediction(pred,fc,dateStr,el,rawResults){
  const w=wmo(pred.code);
  const trI=pred.trend.max>0.1?'📈':pred.trend.max<-0.1?'📉':'➡️';
  const trT=pred.trend.max>0.1?'потепління':pred.trend.max<-0.1?'похолодання':'стабільно';

  let compH='';
  if(fc){
    const fw=wmo(fc.code);
    compH=`<div class="comp"><h3>📊 Порівняння з офіційним прогнозом</h3>
<div class="comp-row">
<div class="comp-card"><h4>🔮 Наше передбачення</h4><div style="font-size:2rem">${w.i}</div>
<div style="font-size:1.2rem;font-weight:700">${pred.tmax}° / ${pred.tmin}°</div>
<div style="font-size:.8rem;color:var(--text3)">Опади: ${pred.precip} мм</div></div>
<div class="comp-card"><h4>🌐 Метеопрогноз</h4><div style="font-size:2rem">${fw.i}</div>
<div style="font-size:1.2rem;font-weight:700">${Math.round(fc.tmax)}° / ${Math.round(fc.tmin)}°</div>
<div style="font-size:.8rem;color:var(--text3)">Опади: ${fc.precip} мм</div></div></div></div>`;
  }

  el.innerHTML=`
<h3 style="text-align:center;margin-bottom:1rem">${city.name} · ${fDF(dateStr)}</h3>
<div class="pred-main">
<div class="p-icon">${w.i}</div>
<div class="p-temp">${pred.tmax}° / ${pred.tmin}°</div>
<div class="p-desc">${w.d}</div>
<div class="p-range">Діапазон: ${pred.range.min[0]}°…${pred.range.max[1]}°</div>
<div class="badge" style="background:${pred.conf.c}">Впевненість: ${pred.conf.t}</div>
</div>

<div class="pred-grid">
<div class="pg"><h4>🌧️ Опади</h4><p>Середньо: ${pred.precip} мм</p><p>Ймовірність: <b>${pred.rainProb}%</b></p></div>
<div class="pg"><h4>${trI} Тренд</h4><p>${trT}</p><p>Макс: ${pred.trend.max>0?'+':''}${pred.trend.max}°/рік</p>
<p>Мін: ${pred.trend.min>0?'+':''}${pred.trend.min}°/рік</p></div>
<div class="pg"><h4>📊 Розкид</h4><p>σ макс: ±${pred.sd.max}°</p><p>σ мін: ±${pred.sd.min}°</p>
<p>За ${pred.yearly.length} років</p></div>
${pred.wind!=null?`<div class="pg"><h4>💨 Вітер</h4><p>~${pred.wind} км/г</p></div>`:''}
</div>

<div class="chart-box"><h3>🌡️ Температура по роках (макс / мін)</h3><canvas id="chPredYears"></canvas></div>
<div class="chart-box"><h3>📈 Тренд температури з регресією</h3><canvas id="chPredTrend"></canvas></div>
<div class="chart-box"><h3>🌧️ Опади по роках</h3><canvas id="chPredPrec"></canvas></div>
<div class="chart-box"><h3>📅 Температура навколо дати (±7 днів) по роках</h3><canvas id="chPredWindow"></canvas></div>

${compH}

<div class="note">⚠️ <b>Як це працює:</b> Аналіз погоди за цю дату (±7 днів) за 5 років.
Зважене середнє (новіші роки → більша вага) + лінійна регресія для трендів.
Впевненість = стандартне відхилення. Це статистика, не офіційний прогноз.</div>`;

  // Chart 1: Years bar chart
  const yLabels=pred.yearly.map(d=>String(d.year));
  mkChart('chPredYears',{type:'bar',data:{labels:yLabels,datasets:[
    {label:'Макс °C',data:pred.yearly.map(d=>r1(d.tmax)),backgroundColor:'rgba(239,68,68,.7)',borderRadius:4},
    {label:'Мін °C',data:pred.yearly.map(d=>r1(d.tmin)),backgroundColor:'rgba(59,130,246,.7)',borderRadius:4}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:12}}},
    scales:{y:{ticks:{font:{size:10}}}}}});

  // Chart 2: Trend with regression
  const yrs=pred.yearly.map(d=>d.year);
  const regMaxLine=yrs.map(y=>r1(pred.trMax.slope*y+pred.trMax.intercept));
  const regMinLine=yrs.map(y=>r1(pred.trMin.slope*y+pred.trMin.intercept));
  mkChart('chPredTrend',{type:'scatter',data:{datasets:[
    {label:'Макс °C (дані)',data:pred.yearly.map(d=>({x:d.year,y:r1(d.tmax)})),backgroundColor:'#ef4444',pointRadius:6},
    {label:'Мін °C (дані)',data:pred.yearly.map(d=>({x:d.year,y:r1(d.tmin)})),backgroundColor:'#3b82f6',pointRadius:6},
    {label:'Тренд макс',data:yrs.map((y,i)=>({x:y,y:regMaxLine[i]})),type:'line',borderColor:'#ef4444',borderDash:[5,3],pointRadius:0,fill:false},
    {label:'Тренд мін',data:yrs.map((y,i)=>({x:y,y:regMinLine[i]})),type:'line',borderColor:'#3b82f6',borderDash:[5,3],pointRadius:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:12}}},
    scales:{x:{type:'linear',ticks:{stepSize:1,callback:v=>v,font:{size:10}}},y:{ticks:{font:{size:10}}}}}});

  // Chart 3: Precipitation by year
  mkChart('chPredPrec',{type:'bar',data:{labels:yLabels,datasets:[
    {label:'Опади мм',data:pred.yearly.map(d=>r1(d.precip)),
      backgroundColor:pred.yearly.map(d=>d.precip>5?'rgba(239,68,68,.7)':d.precip>1?'rgba(251,191,36,.7)':'rgba(59,130,246,.6)'),borderRadius:4}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{y:{min:0,title:{display:true,text:'мм'},ticks:{font:{size:10}}}}}});

  // Chart 4: Window chart — show ±7 days for each year as lines
  const offsets=[];for(let i=-7;i<=7;i++)offsets.push(i);
  const colors=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899'];
  const windowDS=pred.yearly.map((yd,idx)=>{
    const data=offsets.map(o=>{
      const found=yd.days.find(d=>d.offset===o);
      return found&&found.tmax!=null?r1((found.tmax+found.tmin)/2):null;
    });
    return{label:String(yd.year),data,borderColor:colors[idx%colors.length],tension:.3,pointRadius:2,fill:false};
  });
  mkChart('chPredWindow',{type:'line',data:{labels:offsets.map(o=>o===0?'📍 дата':o>0?`+${o}д`:`${o}д`),
    datasets:windowDS},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:10}}}},
    scales:{x:{ticks:{font:{size:9}}},y:{title:{display:true,text:'Сер. °C'},ticks:{font:{size:10}}}}}});
}

/* ═══════════ INIT ═══════════ */
function init(){
  // City search
  const si=$('citySearch'),dd=$('cityDropdown');
  si.value=city.name;
  $('cityInfo').innerHTML=`📍 ${city.region} · ${city.lat.toFixed(2)}°N, ${city.lon.toFixed(2)}°E`;
  buildDropdown();

  si.addEventListener('focus',()=>{buildDropdown(si.value);dd.classList.add('open')});
  si.addEventListener('input',()=>{buildDropdown(si.value);dd.classList.add('open')});
  document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))dd.classList.remove('open')});

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.t)));

  // History
  const now=new Date(),d7=new Date(now);d7.setDate(d7.getDate()-7);
  const d37=new Date(now);d37.setDate(d37.getDate()-37);
  $('hS').value=iso(d37);$('hE').value=iso(d7);
  $('btnH').addEventListener('click',loadHistory);

  // Prediction
  const d30=new Date(now);d30.setDate(d30.getDate()+30);
  $('pD').value=iso(d30);
  $('btnP').addEventListener('click',loadPrediction);

  // Load current
  loadCurrent();
}

document.addEventListener('DOMContentLoaded',init);
</script>
