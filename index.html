<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Weather — 500+ cities</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f0f4f8;--card:#fff;--pri:#2563eb;--prid:#1d4ed8;--tx:#1e293b;--tx2:#475569;--tx3:#94a3b8;
--bor:#e2e8f0;--hov:#f8fafc;--r:14px;--shadow:0 8px 30px rgba(0,0,0,.1)}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--tx:#f1f5f9;--tx2:#cbd5e1;--tx3:#64748b;
--bor:#334155;--hov:#334155;--shadow:0 8px 30px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s}
.hdr{background:linear-gradient(135deg,#0f172a,#1e3a5f 50%,#2563eb);color:#fff;padding:1.8rem 1rem;text-align:center}
.hdr h1{font-size:2rem}.hdr p{opacity:.8;margin-top:.2rem;font-size:.95rem}
.hdr-btns{position:absolute;top:.8rem;right:.8rem;display:flex;gap:.4rem;z-index:2}
.hdr{position:relative}
.hdr-btn{background:rgba(255,255,255,.15);border:none;color:#fff;height:36px;border-radius:18px;
font-size:.85rem;cursor:pointer;transition:.2s;backdrop-filter:blur(4px);padding:0 .8rem;display:flex;align-items:center;gap:.3rem}
.hdr-btn:hover{background:rgba(255,255,255,.3)}
.wrap{max-width:980px;margin:0 auto;padding:0 1rem 2rem}
/* SELECTORS */
.sel-bar{background:var(--card);border-radius:var(--r);padding:.8rem 1rem;margin-top:-1.2rem;position:relative;z-index:60;
box-shadow:var(--shadow);display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;transition:background .3s}
.sel-bar label{font-weight:700;font-size:.9rem;white-space:nowrap}
.sel-bar select{padding:.5rem .7rem;border:2px solid var(--bor);border-radius:8px;font-size:.88rem;
background:var(--hov);color:var(--tx);cursor:pointer;min-width:140px}
.sel-bar select:focus{outline:none;border-color:var(--pri)}
.sw{flex:1;min-width:180px;position:relative}
.sw input{width:100%;padding:.5rem .7rem .5rem 2rem;border:2px solid var(--bor);border-radius:8px;
font-size:.88rem;background:var(--hov);color:var(--tx)}
.sw input:focus{outline:none;border-color:var(--pri)}
.sw::before{content:'🔍';position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none}
.dd{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--card);border:2px solid var(--bor);
border-radius:0 0 10px 10px;max-height:400px;overflow-y:auto;display:none;z-index:200;box-shadow:0 16px 40px rgba(0,0,0,.25)}
.dd.open{display:block}
.dd-cnt{padding:.3rem .6rem;font-size:.75rem;color:var(--tx3);text-align:center;border-bottom:1px solid var(--bor);background:var(--hov);position:sticky;top:0;z-index:2}
.dd-r{padding:.25rem .6rem;font-size:.7rem;font-weight:700;color:var(--pri);background:var(--hov);position:sticky;top:24px;z-index:1}
.dd-i{padding:.4rem .7rem;cursor:pointer;font-size:.85rem;transition:.12s;display:flex;justify-content:space-between}
.dd-i:hover{background:#dbeafe;color:var(--pri)}
[data-theme="dark"] .dd-i:hover{background:#1e3a5f}
.dd-i.act{background:var(--pri);color:#fff}
.dd-i span{font-size:.68rem;color:var(--tx3)}.dd-i.act span{color:rgba(255,255,255,.7)}
.c-info{font-size:.78rem;color:var(--tx3);white-space:nowrap}
/* TABS */
.tabs{display:flex;gap:.25rem;margin-top:1rem;flex-wrap:wrap}
.tbtn{padding:.55rem .9rem;border:none;background:var(--bor);border-radius:10px 10px 0 0;font-size:.85rem;
font-weight:600;cursor:pointer;color:var(--tx3);transition:.2s}
.tbtn:hover{background:#cbd5e1;color:var(--tx)}
.tbtn.on{background:var(--card);color:var(--pri);box-shadow:0 -2px 8px rgba(0,0,0,.05)}
[data-theme="dark"] .tbtn:hover{background:#475569}
.pnl{background:var(--card);border-radius:0 var(--r) var(--r) var(--r);padding:1.3rem;
box-shadow:0 6px 24px rgba(0,0,0,.07);display:none;min-height:150px;transition:background .3s}
.pnl.on{display:block;animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
/* CURRENT */
.cw{text-align:center;padding:.3rem 0}
.cw-ic{font-size:4.5rem}.cw-t{font-size:3.5rem;font-weight:800;letter-spacing:-2px}
.cw-d{font-size:1.05rem;color:var(--tx3);margin-bottom:.2rem}
.cw-time{font-size:.82rem;color:var(--tx3);margin-bottom:.8rem}
.grd{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:.4rem;margin-bottom:.8rem}
.gd{background:var(--hov);border-radius:10px;padding:.55rem;text-align:center;transition:transform .15s}
.gd:hover{transform:translateY(-2px)}
.gd-i{font-size:1.2rem}.gd-l{font-size:.68rem;color:var(--tx3);margin:.03rem 0}.gd-v{font-size:.92rem;font-weight:700}
.rec{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border-radius:12px;padding:.8rem;margin-bottom:.8rem;
display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
[data-theme="dark"] .rec{background:linear-gradient(135deg,#1e3a5f,#14532d)}
.rec-ic{font-size:2.2rem}.rec-txt h4{color:var(--tx2);font-size:.88rem;margin-bottom:.15rem}
.rec-txt p{color:var(--tx3);font-size:.82rem;line-height:1.35}
.hr-scroll{display:flex;gap:.4rem;overflow-x:auto;padding:.5rem 0;scrollbar-width:thin}
.hr{text-align:center;min-width:50px;flex-shrink:0;padding:.35rem;border-radius:8px;background:var(--card);border:1px solid var(--bor)}
.hr-t{font-size:.68rem;color:var(--tx3)}.hr-i{font-size:1.1rem;margin:.05rem 0}.hr-v{font-weight:700;font-size:.82rem}
.hr-r{font-size:.62rem;color:#3b82f6}
.cb{background:var(--hov);border-radius:12px;padding:.8rem;margin-bottom:.7rem}
.cb h3{font-size:.88rem;color:var(--tx2);margin-bottom:.5rem}
.cb canvas{max-height:200px;width:100%!important}
/* FORECAST */
.fc-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:.4rem;margin-bottom:.7rem}
.fc{background:linear-gradient(135deg,var(--hov),#eff6ff);border-radius:10px;padding:.5rem .3rem;text-align:center;
cursor:pointer;transition:.2s;border:2px solid transparent;user-select:none}
[data-theme="dark"] .fc{background:linear-gradient(135deg,#1e293b,#1e3a5f)}
.fc:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.1)}
.fc.sel{border-color:var(--pri);background:linear-gradient(135deg,#dbeafe,#eff6ff)}
[data-theme="dark"] .fc.sel{background:linear-gradient(135deg,#1e3a5f,#2563eb30)}
.fc-dt{font-size:.68rem;color:var(--tx2);font-weight:600;margin-bottom:.15rem}
.fc-ic{font-size:1.7rem;margin:.05rem 0}.fc-hi{font-weight:800;font-size:.9rem}.fc-lo{color:var(--tx3);font-size:.78rem}
.fc-rn{font-size:.65rem;color:#3b82f6;margin-top:.08rem}
.ddet{background:linear-gradient(135deg,#fafbff,#f0f7ff);border-radius:var(--r);padding:1.3rem;margin-top:.5rem;border:1px solid #dbeafe;animation:fu .3s}
[data-theme="dark"] .ddet{background:linear-gradient(135deg,#1e293b,#1e3a5f);border-color:#334155}
.ddet-hdr{text-align:center;margin-bottom:1rem}
.ddet-hdr .ddi{font-size:4rem}.ddet-hdr .ddt{font-size:2.6rem;font-weight:800}
.ddet-hdr .ddd{color:var(--tx2);font-size:1rem;margin:.15rem 0}
.ddet-hdr .dds{color:var(--tx3);font-size:.82rem}
.htbl{max-height:320px;overflow-y:auto;border:1px solid var(--bor);border-radius:8px;margin-top:.7rem;scrollbar-width:thin}
table{width:100%;border-collapse:collapse}
th,td{padding:.35rem .4rem;text-align:center;border-bottom:1px solid var(--bor);font-size:.78rem}
th{background:var(--hov);font-weight:700;color:var(--tx2);position:sticky;top:0;z-index:2}
tbody tr:hover{background:var(--hov)}
.ctrl{display:flex;gap:.5rem;flex-wrap:wrap;align-items:end;margin-bottom:.7rem}
.fg{display:flex;flex-direction:column;gap:.1rem}
.fg label{font-size:.72rem;font-weight:600;color:var(--tx2)}
.fg input{padding:.4rem .55rem;border:2px solid var(--bor);border-radius:8px;font-size:.85rem;background:var(--hov);color:var(--tx)}
.fg input:focus{outline:none;border-color:var(--pri)}
.btn{padding:.45rem 1rem;background:var(--pri);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.btn:hover{background:var(--prid);transform:translateY(-1px)}
.smry{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.7rem}
.sm{background:var(--hov);border-radius:10px;padding:.45rem .6rem;flex:1;min-width:75px;text-align:center}
.sm-l{font-size:.65rem;color:var(--tx3)}.sm-v{font-size:1rem;font-weight:700}
.pmain{text-align:center;background:linear-gradient(135deg,#faf5ff,#eff6ff);border-radius:var(--r);padding:1.2rem;margin-bottom:.8rem}
[data-theme="dark"] .pmain{background:linear-gradient(135deg,#1e1b4b,#1e3a5f)}
.pmain .pi{font-size:3.5rem}.pmain .pt{font-size:2.4rem;font-weight:800}
.pmain .pd{color:var(--tx2);font-size:1rem;margin:.15rem 0}.pmain .pr{color:var(--tx3);font-size:.8rem}
.badge{display:inline-block;color:#fff;padding:.2rem .7rem;border-radius:20px;font-size:.78rem;font-weight:600;margin-top:.4rem}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.5rem;margin-bottom:.8rem}
.pg{background:var(--hov);border-radius:10px;padding:.7rem}
.pg h4{color:var(--tx2);margin-bottom:.2rem;font-size:.85rem}
.pg p{color:var(--tx3);font-size:.8rem;margin:.06rem 0}
.comp{padding:.8rem;background:var(--hov);border-radius:12px;margin-top:.7rem}
.comp h3{margin-bottom:.5rem;font-size:.92rem;color:var(--tx2)}
.comp2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.cc{text-align:center;padding:.6rem;background:var(--card);border-radius:10px}
.cc h4{font-size:.75rem;color:var(--tx3);margin-bottom:.1rem}
.note{margin-top:.8rem;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:.7rem;font-size:.78rem;color:#92400e;line-height:1.4}
[data-theme="dark"] .note{background:#422006;border-color:#854d0e;color:#fbbf24}
.ld{text-align:center;padding:2rem;color:var(--tx3)}
.sp{display:inline-block;width:30px;height:30px;border:3px solid var(--bor);border-top-color:var(--pri);border-radius:50%;animation:rr .6s linear infinite;margin-bottom:.4rem}
@keyframes rr{to{transform:rotate(360deg)}}
.err{background:#fef2f2;color:#dc2626;padding:.7rem;border-radius:8px;border:1px solid #fecaca;font-size:.85rem}
[data-theme="dark"] .err{background:#450a0a;border-color:#991b1b;color:#fca5a5}
.ftr{text-align:center;padding:1rem;color:var(--tx3);font-size:.75rem}
.ftr a{color:#3b82f6;text-decoration:none}
@media(max-width:600px){
.hdr h1{font-size:1.3rem}.cw-t{font-size:2.5rem}.cw-ic{font-size:3.5rem}
.tbtn{padding:.4rem .6rem;font-size:.75rem}.pnl{padding:.8rem}
.fc-g{grid-template-columns:repeat(auto-fill,minmax(72px,1fr))}
.sel-bar{flex-direction:column;align-items:stretch}.comp2{grid-template-columns:1fr}
.ddet-hdr .ddt{font-size:2rem}.ddet-hdr .ddi{font-size:3rem}
.grd{grid-template-columns:repeat(auto-fit,minmax(90px,1fr))}.hdr-btns{top:.4rem;right:.4rem}
}
</style>
</head>
<body>

<div class="hdr-btns">
<button class="hdr-btn" onclick="toggleLang()" id="langBtn">🌐 EN</button>
<button class="hdr-btn" onclick="toggleTheme()">🌓</button>
</div>
<h1 id="hdrTitle">🌤️ World Weather</h1>
<p id="hdrSub">500+ cities · 30 countries · Forecast · Charts · History · Prediction</p>
</div>
<div class="wrap">
<div class="sel-bar">
<label id="lblCountry">🌍</label>
<select id="countrySel"></select>

<div class="dd" id="dd"></div>
</div>
<div class="c-info" id="ci"></div>
</div>
<div class="tabs">
<button class="tbtn on" data-t="cur" id="tabCur">🌡️</button>
<button class="tbtn" data-t="fc" id="tabFc">📅</button>
<button class="tbtn" data-t="hist" id="tabHist">📜</button>
<button class="tbtn" data-t="pred" id="tabPred">🔮</button>
</div>
<div class="pnl on" id="p-cur"><div id="o-cur"></div></div>
<div class="pnl" id="p-fc"><div id="o-fc"></div></div>
<div class="pnl" id="p-hist">
<div class="ctrl">
<div class="fg"><label id="lblFrom">From:</label><input type="date" id="hS"></div>
<div class="fg"><label id="lblTo">To:</label><input type="date" id="hE"></div>
<button class="btn" onclick="loadHist()" id="btnHist">📜</button>
</div>
<div id="o-hist"></div>
</div>
<div class="pnl" id="p-pred">
<p id="predDesc" style="color:var(--tx3);margin-bottom:.6rem;font-size:.85rem;line-height:1.4"></p>
<div class="ctrl">
<div class="fg"><label id="lblPredDate">Date:</label><input type="date" id="pD"></div>
<button class="btn" onclick="loadPred()" id="btnPred">🔮</button>
</div>
<div id="o-pred"></div>
</div>
</div>
<div class="ftr">
Data: <a href="https://open-meteo.com/" target="_blank">Open-Meteo.com</a> — free API ·
<span id="totalCities"></span>
</div>

const dayLen=(a,b)=>{if(a==='—'||b==='—')return'—';const[h1,m1]=a.split(':').map(Number),[h2,m2]=b.split(':').map(Number);const m=(h2*60+m2)-(h1*60+m1);return Math.floor(m/60)+'h '+m%60+'m'};

function getRec(temp,code,wind){
  let ic='👕',ti,de;
  if(temp<=-10){ic='🧥';ti='❄️';de=t('recCold')}
  else if(temp<=0){ic='🧣';ti='🥶';de=t('recCool')}
  else if(temp<=10){ic='🧥';ti='🌬️';de=t('recMild')}
  else if(temp<=20){ic='👔';ti='👍';de=t('recComf')}
  else if(temp<=30){ic='👕';ti='☀️';de=t('recWarm')}
  else{ic='🥵';ti='🔥';de=t('recHot')}
  if(code>=61&&code<=67||code>=80&&code<=82)de+=t('recRain');
  else if(code>=71&&code<=77||code>=85&&code<=86)de+=t('recSnow');
  else if(code>=95)de+=t('recStorm');
  if(wind>50)de+=t('recWind');
  return{ic,ti,de};
}

/* ═══════ COUNTRY & CITY SELECTION ═══════ */
function buildCountrySel(){
  const sel=$('countrySel');
  COUNTRIES.forEach((c,i)=>{
    const o=document.createElement('option');
    o.value=i;o.textContent=c.flag+' '+c.n[lang];
    sel.appendChild(o);
  });
  sel.addEventListener('change',()=>{
    curCountry=COUNTRIES[+sel.value];
    const firstCity=ALL_CITIES[curCountry.cityStart];
    selectCity(curCountry.cityStart);
  });
}

function buildDD(filter){
  const dd=$('dd');const fl=(filter||'').toLowerCase().trim();
  let h='',total=0;
  const start=curCountry.cityStart, end=curCountry.cityEnd;
  // Group by region
  curCountry.regions.forEach(reg=>{
    const matched=reg.cities.filter(c=>!fl||c.n.toLowerCase().includes(fl));
    if(!matched.length)return;
    total+=matched.length;
    h+='<div class="dd-r">'+reg.name+' ('+matched.length+')</div>';
    matched.forEach(c=>{
      const idx=ALL_CITIES.findIndex(ac=>ac.n===c.n&&ac.r===reg.name&&ac.cc===curCountry.code);
      const isAct=(city.n===c.n&&city.r===reg.name);
      h+='<div class="dd-i'+(isAct?' act':'')+'" data-i="'+idx+'">'+c.n+'<span>'+reg.name+'</span></div>';
    });
  });
  h='<div class="dd-cnt">'+t('found')+': <b>'+total+'</b> '+t('of')+' '+(end-start)+' '+t('cities')+'</div>'+h;
  if(!total)h='<div style="padding:1rem;text-align:center;color:var(--tx3)">😕</div>';
  dd.innerHTML=h;
}

function selectCity(idx){
  city=ALL_CITIES[idx];
  $('si').value=city.n;
  $('ci').innerHTML=curCountry.flag+' '+curCountry.n[lang]+' · <b>'+city.la.toFixed(2)+'°, '+city.lo.toFixed(2)+'°</b>';
  $('dd').classList.remove('open');
  _fcD=null;_fcH=null;
  loadCurrentTab();
}

function initCitySearch(){
  const si=$('si'),dd=$('dd');
  si.addEventListener('focus',()=>{si.value='';buildDD('');dd.classList.add('open')});
  si.addEventListener('input',()=>{buildDD(si.value);dd.classList.add('open')});
  dd.addEventListener('mousedown',e=>{const it=e.target.closest('.dd-i');if(it&&it.dataset.i!=null){e.preventDefault();selectCity(+it.dataset.i)}});
  document.addEventListener('click',e=>{if(!e.target.closest('.sw')){dd.classList.remove('open');si.value=city.n}});
  si.addEventListener('keydown',e=>{if(e.key==='Escape'){dd.classList.remove('open');si.value=city.n;si.blur()}});
}

/* ═══════ HISTORY ═══════ */
async function loadHist(){
  const el=$('o-hist'),s=$('hS').value,e=$('hE').value;
  if(!s||!e){sE(el,t('errDates'));return}if(s>e){sE(el,t('errDateOrder'));return}sL(el);
  try{
    const d=await api('https://archive-api.open-meteo.com/v1/archive?latitude='+city.la+'&longitude='+city.lo+'&start_date='+s+'&end_date='+e+'&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=auto');
    rendHist(d,el);
  }catch(e){sE(el,t('errHistApi'))}
}
function rendHist(d,el){
  const dl=d.daily;if(!dl||!dl.time||!dl.time.length){sE(el,t('errNoData'));return}
  const mx=dl.temperature_2m_max,mn=dl.temperature_2m_min,pr=dl.precipitation_sum,wn=dl.wind_speed_10m_max;
  const vx=mx.filter(v=>v!=null),vn=mn.filter(v=>v!=null),vp=pr.filter(v=>v!=null);
  const avg=a=>r1(a.reduce((s,v)=>s+v,0)/a.length);
  let h=`<div class="smry"><div class="sm"><div class="sm-l">${t('avgMax')}</div><div class="sm-v" style="color:#ef4444">${avg(vx)}°</div></div><div class="sm"><div class="sm-l">${t('avgMin')}</div><div class="sm-v" style="color:#3b82f6">${avg(vn)}°</div></div><div class="sm"><div class="sm-l">${t('recHi')}</div><div class="sm-v">${r1(Math.max(...vx))}°</div></div><div class="sm"><div class="sm-l">${t('recLo')}</div><div class="sm-v">${r1(Math.min(...vn))}°</div></div><div class="sm"><div class="sm-l">${t('totalPrecip')}</div><div class="sm-v">${r1(vp.reduce((a,b)=>a+b,0))}mm</div></div><div class="sm"><div class="sm-l">${t('days')}</div><div class="sm-v">${dl.time.length}</div></div></div>`;
  h+=`<div class="cb"><h3>🌡️ ${t('tempChart')}</h3><canvas id="h1"></canvas></div><div class="cb"><h3>🌧️ ${t('precipChart')}</h3><canvas id="h2"></canvas></div><div class="cb"><h3>💨 ${t('windChart')}</h3><canvas id="h3"></canvas></div>`;
  h+='<div class="htbl"><table><thead><tr><th>'+t('time')+'</th><th></th><th>'+t('max')+'</th><th>'+t('min')+'</th><th>'+t('precip')+'</th><th>'+t('wind')+'</th></tr></thead><tbody>';
  for(let i=0;i<dl.time.length;i++){h+=`<tr><td>${fD(dl.time[i])}</td><td>${wIc(dl.weather_code[i])}</td><td>${mx[i]!=null?mx[i]+'°':'—'}</td><td>${mn[i]!=null?mn[i]+'°':'—'}</td><td>${pr[i]!=null?pr[i]+'mm':'—'}</td><td>${wn[i]!=null?wn[i]+'km/h':'—'}</td></tr>`}
  h+='</tbody></table></div>';el.innerHTML=h;
  const lb=dl.time.map(fD),nr=dl.time.length>60?0:2;
  mc('h1',{type:'line',data:{labels:lb,datasets:[{label:t('max'),data:mx,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.08)',fill:'+1',tension:.3,pointRadius:nr},{label:t('min'),data:mn,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',tension:.3,pointRadius:nr}]},options:cO()});
  mc('h2',{type:'bar',data:{labels:lb,datasets:[{label:'mm',data:pr,backgroundColor:pr.map(v=>v>10?'rgba(239,68,68,.7)':v>3?'rgba(251,191,36,.7)':'rgba(59,130,246,.5)'),borderRadius:2}]},options:{...cO(),plugins:{legend:{display:false}}}});
  mc('h3',{type:'line',data:{labels:lb,datasets:[{label:'km/h',data:wn,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',fill:true,tension:.3,pointRadius:nr}]},options:cO()});
}

/* ═══════ PREDICTION ═══════ */
function linR(x,y){const n=x.length,sx=x.reduce((a,b)=>a+b,0),sy=y.reduce((a,b)=>a+b,0),sxy=x.reduce((s,xi,i)=>s+xi*y[i],0),sx2=x.reduce((s,xi)=>s+xi*xi,0),dn=n*sx2-sx*sx;if(!dn)return{s:0,i:sy/n};const sl=(n*sxy-sx*sy)/dn;return{s:sl,i:(sy-sl*sx)/n}}
function stdev(a){const m=a.reduce((s,v)=>s+v,0)/a.length;return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length)}
async function loadPred(){
  const el=$('o-pred'),ds=$('pD').value;if(!ds){sE(el,t('errDates'));return}sL(el);
  try{
    const tgt=new Date(ds+'T00:00'),mo=tgt.getMonth()+1,dy=tgt.getDate(),tY=tgt.getFullYear();
    const now=new Date(),cY=now.getFullYear(),yrs=[];for(let y=cY-8;y<=cY-1;y++)yrs.push(y);
    const pad=n=>String(n).padStart(2,'0');
    const ps=yrs.map(y=>{const c=new Date(y,mo-1,dy),s=new Date(c),e=new Date(c);s.setDate(s.getDate()-10);e.setDate(e.getDate()+10);
      return api('https://archive-api.open-meteo.com/v1/archive?latitude='+city.la+'&longitude='+city.lo+'&start_date='+iso(s)+'&end_date='+iso(e)+'&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=auto').then(d=>({year:y,data:d})).catch(()=>null)});
    let fc=null;const diff=Math.ceil((tgt-now)/864e5);
    if(diff>=0&&diff<=14){try{const fd=await api('https://api.open-meteo.com/v1/forecast?latitude='+city.la+'&longitude='+city.lo+'&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto&forecast_days=15');const ix=fd.daily.time.indexOf(ds);if(ix>=0)fc={mx:fd.daily.temperature_2m_max[ix],mn:fd.daily.temperature_2m_min[ix],pr:fd.daily.precipitation_sum[ix],wc:fd.daily.weather_code[ix]};}catch(e){}}
    const res=(await Promise.all(ps)).filter(Boolean);if(res.length<2){sE(el,t('errPredData'));return}
    const pred=calcP(res,mo,dy,tY);rendPred(pred,fc,ds,el);
  }catch(e){sE(el,t('errPredCalc'))}
}
function calcP(res,mo,dy,tY){
  const pad=n=>String(n).padStart(2,'0'),gauss=(d,sig)=>Math.exp(-(d*d)/(2*sig*sig));
  const yearly=res.map(({year,data})=>{const dl=data.daily,tgt=`${year}-${pad(mo)}-${pad(dy)}`;
    let wm=0,wn=0,wp=0,ww=0,tw=0,wdw=0;const days=[];
    for(let i=0;i<dl.time.length;i++){const diff=Math.abs(new Date(dl.time[i]+'T00:00')-new Date(tgt+'T00:00'))/864e5;const w=gauss(diff,3);
      if(w>0.01&&dl.temperature_2m_max[i]!=null){tw+=w;wm+=dl.temperature_2m_max[i]*w;wn+=dl.temperature_2m_min[i]*w;wp+=(dl.precipitation_sum[i]||0)*w;if(dl.wind_speed_10m_max[i]!=null){ww+=dl.wind_speed_10m_max[i]*w;wdw+=w;}}
      days.push({date:dl.time[i],tmax:dl.temperature_2m_max[i],tmin:dl.temperature_2m_min[i],precip:dl.precipitation_sum[i],off:Math.round((new Date(dl.time[i]+'T00:00')-new Date(tgt+'T00:00'))/864e5)});}
    if(!tw)return null;return{year,tmax:wm/tw,tmin:wn/tw,precip:wp/tw,wind:wdw?ww/wdw:null,days};}).filter(Boolean);
  if(!yearly.length)throw new Error('no data');
  const n=yearly.length;let TW=0,sm=0,sn=0,sp=0,sw=0,sww=0;
  yearly.forEach((d,i)=>{const w=Math.pow(1.5,i);TW+=w;sm+=d.tmax*w;sn+=d.tmin*w;sp+=d.precip*w;if(d.wind!=null){sw+=d.wind*w;sww+=w;}});
  const bM=sm/TW,bN=sn/TW,bP=sp/TW,bW=sww?sw/sww:null;
  const ys=yearly.map(d=>d.year),tmA=yearly.map(d=>d.tmax),tnA=yearly.map(d=>d.tmin),prA=yearly.map(d=>d.precip);
  const trM=linR(ys,tmA),trN=linR(ys,tnA),trP=linR(ys,prA);
  const pM=bM*.6+(trM.s*tY+trM.i)*.4,pN=bN*.6+(trN.s*tY+trN.i)*.4,pP=Math.max(0,bP*.6+(trP.s*tY+trP.i)*.4);
  const sdM=stdev(tmA),sdN=stdev(tnA),aSD=(sdM+sdN)/2;
  let conf;if(aSD<1.5&&n>=5)conf={t:t('high'),c:'#16a34a'};else if(aSD<3)conf={t:t('medium'),c:'#ca8a04'};else conf={t:t('low'),c:'#dc2626'};
  const rainy=yearly.filter(d=>d.precip>.5).length,rP=Math.round(rainy/n*100);
  let code;if(pP>8)code=pM<0?75:65;else if(pP>3)code=pM<0?73:63;else if(pP>.5)code=pM<0?71:61;else if(pP>.1)code=3;else code=mo>=5&&mo<=9?1:2;
  return{tmax:r1(pM),tmin:r1(pN),precip:r1(pP),wind:bW!=null?r1(bW):null,code,conf,rP,
    trend:{mx:r1(trM.s),mn:r1(trN.s),pr:r1(trP.s)},sd:{mx:r1(sdM),mn:r1(sdN)},yearly,trM,trN,
    range:{mx:[r1(Math.min(...tmA)),r1(Math.max(...tmA))],mn:[r1(Math.min(...tnA)),r1(Math.max(...tnA))]}};
}
function rendPred(p,fc,ds,el){
  const wi=wIc(p.code),wd2=wDesc(p.code);
  const trI=p.trend.mx>0.1?'📈':p.trend.mx<-0.1?'📉':'➡️';
  const trT=p.trend.mx>0.1?t('warming'):p.trend.mx<-0.1?t('cooling'):t('stable');
  let compH='';
  if(fc){compH=`<div class="comp"><h3>📊 ${t('compTitle')}</h3><div class="comp2"><div class="cc"><h4>🔮 ${t('ourPred')}</h4><div style="font-size:1.8rem">${wi}</div><div style="font-weight:700">${p.tmax}°/${p.tmin}°</div><div style="font-size:.75rem;color:var(--tx3)">${p.precip}mm</div></div><div class="cc"><h4>🌐 ${t('officialFc')}</h4><div style="font-size:1.8rem">${wIc(fc.wc)}</div><div style="font-weight:700">${Math.round(fc.mx)}°/${Math.round(fc.mn)}°</div><div style="font-size:.75rem;color:var(--tx3)">${fc.pr}mm</div></div></div></div>`}
  el.innerHTML=`<h3 style="text-align:center;margin-bottom:.7rem">${city.n} · ${fDF(ds)}</h3>
<div class="pmain"><div class="pi">${wi}</div><div class="pt">${p.tmax}° / ${p.tmin}°</div><div class="pd">${wd2}</div><div class="pr">${t('histRange')}: ${p.range.mn[0]}°…${p.range.mx[1]}°</div><div class="badge" style="background:${p.conf.c}">${t('confidence')}: ${p.conf.t}</div></div>
<div class="pgrid">
<div class="pg"><h4>🌧️ ${t('precip')}</h4><p>~${p.precip} mm</p><p>${t('rainSnowProb')}: <b>${p.rP}%</b></p><p>${t('trend')}: ${p.trend.pr>0?'+':''}${p.trend.pr} ${t('precipPerYear')}</p></div>
<div class="pg"><h4>${trI} ${t('trend')}</h4><p><b>${trT}</b></p><p>${t('max')}: ${p.trend.mx>0?'+':''}${p.trend.mx}°${t('perYear')}</p><p>${t('min')}: ${p.trend.mn>0?'+':''}${p.trend.mn}°${t('perYear')}</p></div>
<div class="pg"><h4>📊 ${t('spread')}</h4><p>σ ${t('max')}: ±${p.sd.mx}°</p><p>σ ${t('min')}: ±${p.sd.mn}°</p><p>${p.yearly.length} ${t('analyzedYears')}</p></div>
${p.wind!=null?`<div class="pg"><h4>💨 ${t('wind')}</h4><p>~${p.wind} km/h</p></div>`:''}</div>
<div class="cb"><h3>🌡️ ${t('byYears')}</h3><canvas id="p1"></canvas></div>
<div class="cb"><h3>📈 ${t('trendReg')}</h3><canvas id="p2"></canvas></div>
<div class="cb"><h3>🌧️ ${t('precipByYears')}</h3><canvas id="p3"></canvas></div>
<div class="cb"><h3>📅 ${t('windowChart')}</h3><canvas id="p4"></canvas></div>
${compH}
<div class="note">⚠️ <b>${t('algoTitle')}</b><br>${t('algoDesc').replace(/\n/g,'<br>')}<br><br>${t('algoNote')}</div>`;
  const yL=p.yearly.map(d=>String(d.year)),yn=p.yearly.map(d=>d.year);
  mc('p1',{type:'bar',data:{labels:yL,datasets:[{label:t('max'),data:p.yearly.map(d=>r1(d.tmax)),backgroundColor:'rgba(239,68,68,.7)',borderRadius:4},{label:t('min'),data:p.yearly.map(d=>r1(d.tmin)),backgroundColor:'rgba(59,130,246,.7)',borderRadius:4}]},options:cO()});
  const rM=yn.map(y=>r1(p.trM.s*y+p.trM.i)),rN=yn.map(y=>r1(p.trN.s*y+p.trN.i));
  mc('p2',{type:'scatter',data:{datasets:[{label:t('max'),data:p.yearly.map(d=>({x:d.year,y:r1(d.tmax)})),backgroundColor:'#ef4444',pointRadius:6},{label:t('min'),data:p.yearly.map(d=>({x:d.year,y:r1(d.tmin)})),backgroundColor:'#3b82f6',pointRadius:6},{label:t('trend')+' '+t('max'),data:yn.map((y,i)=>({x:y,y:rM[i]})),type:'line',borderColor:'#ef4444',borderDash:[5,3],pointRadius:0,fill:false},{label:t('trend')+' '+t('min'),data:yn.map((y,i)=>({x:y,y:rN[i]})),type:'line',borderColor:'#3b82f6',borderDash:[5,3],pointRadius:0,fill:false}]},options:cO({scales:{x:{type:'linear',ticks:{stepSize:1,callback:v=>v,font:{size:9}}},y:{ticks:{font:{size:9}}}}})});
  mc('p3',{type:'bar',data:{labels:yL,datasets:[{label:'mm',data:p.yearly.map(d=>r1(d.precip)),backgroundColor:p.yearly.map(d=>d.precip>5?'rgba(239,68,68,.7)':d.precip>1?'rgba(251,191,36,.7)':'rgba(59,130,246,.5)'),borderRadius:3}]},options:{...cO(),plugins:{legend:{display:false}}}});
  const offs=[];for(let i=-10;i<=10;i++)offs.push(i);
  const clr=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6'];
  mc('p4',{type:'line',data:{labels:offs.map(o=>o===0?'📍':o>0?'+'+o:String(o)),datasets:p.yearly.map((yd,ix)=>({label:String(yd.year),data:offs.map(o=>{const f=yd.days.find(d=>d.off===o);return f&&f.tmax!=null?r1((f.tmax+f.tmin)/2):null}),borderColor:clr[ix%clr.length],tension:.3,pointRadius:1,fill:false,borderWidth:2}))},options:cO()});
}
