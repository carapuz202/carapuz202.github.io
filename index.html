let ddOpen=false;

function buildDD(filter){
  const dd=$('dd');
  const fl=(filter||'').toLowerCase().trim();
  let h='',total=0;

  R.forEach(([rn,cs])=>{
    const matched=cs.filter(([n])=> !fl || n.toLowerCase().includes(fl));
    if(!matched.length) return;
    total+=matched.length;
    h+='<div class="dd-r">'+rn+' — '+matched.length+' міст</div>';
    matched.forEach(([n])=>{
      const idx=C.findIndex(c=>c.n===n && c.r===rn);
      const isAct=(city.n===n && city.r===rn);
      h+='<div class="dd-i'+(isAct?' act':'')+'" data-i="'+idx+'">'+n+'<span>'+rn+'</span></div>';
    });
  });

  h='<div class="city-count">Знайдено: '+total+' з '+C.length+' міст</div>'+h;
  if(!total) h='<div style="padding:1rem;text-align:center;color:var(--tx3)">Нічого не знайдено 😕</div>';
  dd.innerHTML=h;
}

function openDD(){
  const dd=$('dd');
  ddOpen=true;
  dd.classList.add('open');
}
function closeDD(){
  const dd=$('dd');
  ddOpen=false;
  dd.classList.remove('open');
  $('si').value=city.n; // відновити ім'я міста
}

function pickCity(idx){
  city=C[idx];
  $('si').value=city.n;
  $('ci').textContent='📍 '+city.r+' · '+city.la.toFixed(2)+'°N '+city.lo.toFixed(2)+'°E';
  closeDD();
  _fcD=null;_fcH=null;
  loadTab();
}

function initCitySearch(){
  const si=$('si');
  const dd=$('dd');

  // ФОКУС — очистити поле і показати ВСІ міста
  si.addEventListener('focus',()=>{
    si.value='';          // ← ГОЛОВНИЙ ФІКС!
    buildDD('');           // показати ВСІ 211 міст
    openDD();
  });

  // Набір тексту — фільтрувати
  si.addEventListener('input',()=>{
    buildDD(si.value);
    if(!ddOpen) openDD();
  });

  // Клік по місту — mousedown щоб спрацювало до blur
  dd.addEventListener('mousedown',(e)=>{
    const item=e.target.closest('.dd-i');
    if(item && item.dataset.i!=null){
      e.preventDefault();   // не давати blur закрити dd
      pickCity(+item.dataset.i);
    }
  });

  // Клік поза dropdown — закрити
  document.addEventListener('click',(e)=>{
    if(!e.target.closest('.sw')){
      closeDD();
    }
  });

  // ESC — закрити
  si.addEventListener('keydown',(e)=>{
    if(e.key==='Escape') closeDD();
  });
}

/* ═══ HISTORY ═══ */
async function loadHist(){
  const el=$('o-hist'),s=$('hS').value,e=$('hE').value;
  if(!s||!e){sE(el,'Оберіть дати.');return}
  if(s>e){sE(el,'Початок раніше кінця.');return}
  sL(el);
  try{
    const d=await api('https://archive-api.open-meteo.com/v1/archive?latitude='+city.la+'&longitude='+city.lo+
      '&start_date='+s+'&end_date='+e+'&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=auto');
    rendHist(d,el);
  }catch(e){sE(el,'Помилка. Архів доступний до вчора.')}
}
function rendHist(d,el){
  const dl=d.daily;if(!dl||!dl.time||!dl.time.length){sE(el,'Немає даних.');return}
  const mx=dl.temperature_2m_max,mn=dl.temperature_2m_min,pr=dl.precipitation_sum,wn=dl.wind_speed_10m_max;
  const vx=mx.filter(v=>v!=null),vn=mn.filter(v=>v!=null),vp=pr.filter(v=>v!=null);
  const avg=a=>r1(a.reduce((s,v)=>s+v,0)/a.length);
  let h=`<div class="smry">
<div class="sm"><div class="sm-l">Сер.макс</div><div class="sm-v">${avg(vx)}°</div></div>
<div class="sm"><div class="sm-l">Сер.мін</div><div class="sm-v">${avg(vn)}°</div></div>
<div class="sm"><div class="sm-l">Рекорд↑</div><div class="sm-v">${r1(Math.max(...vx))}°</div></div>
<div class="sm"><div class="sm-l">Рекорд↓</div><div class="sm-v">${r1(Math.min(...vn))}°</div></div>
<div class="sm"><div class="sm-l">Σ Опадів</div><div class="sm-v">${r1(vp.reduce((a,b)=>a+b,0))}мм</div></div>
<div class="sm"><div class="sm-l">Днів</div><div class="sm-v">${dl.time.length}</div></div></div>`;
  h+=`<div class="cb"><h3>🌡️ Температура</h3><canvas id="ht"></canvas></div>`;
  h+=`<div class="cb"><h3>🌧️ Опади</h3><canvas id="hp"></canvas></div>`;
  h+=`<div class="cb"><h3>💨 Вітер</h3><canvas id="hw"></canvas></div>`;
  h+=`<div class="htbl"><table><thead><tr><th>Дата</th><th></th><th>Макс°</th><th>Мін°</th><th>Опади</th><th>Вітер</th></tr></thead><tbody>`;
  for(let i=0;i<dl.time.length;i++){const w=wm(dl.weather_code[i]);
    h+=`<tr><td>${fD(dl.time[i])}</td><td>${w.i}</td><td>${mx[i]!=null?mx[i]+'°':'—'}</td><td>${mn[i]!=null?mn[i]+'°':'—'}</td><td>${pr[i]!=null?pr[i]+'мм':'—'}</td><td>${wn[i]!=null?wn[i]+'км/г':'—'}</td></tr>`}
  h+='</tbody></table></div>';el.innerHTML=h;
  const lb=dl.time.map(fD),nr=dl.time.length>60?0:2;
  mc('ht',{type:'line',data:{labels:lb,datasets:[
    {label:'Макс',data:mx,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.08)',fill:'+1',tension:.3,pointRadius:nr},
    {label:'Мін',data:mn,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',tension:.3,pointRadius:nr}
  ]},options:cO()});
  mc('hp',{type:'bar',data:{labels:lb,datasets:[
    {label:'мм',data:pr,backgroundColor:pr.map(v=>v>10?'rgba(239,68,68,.7)':v>3?'rgba(251,191,36,.7)':'rgba(59,130,246,.5)'),borderRadius:2}
  ]},options:{...cO(),plugins:{legend:{display:false}}}});
  mc('hw',{type:'line',data:{labels:lb,datasets:[
    {label:'км/г',data:wn,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',fill:true,tension:.3,pointRadius:nr}
  ]},options:cO()});
}

/* ═══ PREDICTION ═══ */
function linR(x,y){const n=x.length,sx=x.reduce((a,b)=>a+b,0),sy=y.reduce((a,b)=>a+b,0);
  const sxy=x.reduce((s,xi,i)=>s+xi*y[i],0),sx2=x.reduce((s,xi)=>s+xi*xi,0),dn=n*sx2-sx*sx;
  if(!dn)return{s:0,i:sy/n};const sl=(n*sxy-sx*sy)/dn;return{s:sl,i:(sy-sl*sx)/n}}
function stdev(a){const m=a.reduce((s,v)=>s+v,0)/a.length;return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length)}

async function loadPred(){
  const el=$('o-pred'),ds=$('pD').value;
  if(!ds){sE(el,'Оберіть дату.');return}sL(el);
  try{
    const tgt=new Date(ds+'T00:00'),mo=tgt.getMonth()+1,dy=tgt.getDate(),tY=tgt.getFullYear();
    const now=new Date(),cY=now.getFullYear(),yrs=[];
    for(let y=cY-8;y<=cY-1;y++)yrs.push(y);
    const pad=n=>String(n).padStart(2,'0');
    const proms=yrs.map(y=>{
      const c=new Date(y,mo-1,dy),s=new Date(c),e=new Date(c);s.setDate(s.getDate()-10);e.setDate(e.getDate()+10);
      return api('https://archive-api.open-meteo.com/v1/archive?latitude='+city.la+'&longitude='+city.lo+
        '&start_date='+iso(s)+'&end_date='+iso(e)+'&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=auto')
        .then(d=>({year:y,data:d})).catch(()=>null)});
    let fc=null;const diff=Math.ceil((tgt-now)/864e5);
    if(diff>=0&&diff<=14){try{
      const fd=await api('https://api.open-meteo.com/v1/forecast?latitude='+city.la+'&longitude='+city.lo+
        '&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto&forecast_days=15');
      const ix=fd.daily.time.indexOf(ds);
      if(ix>=0)fc={mx:fd.daily.temperature_2m_max[ix],mn:fd.daily.temperature_2m_min[ix],pr:fd.daily.precipitation_sum[ix],wc:fd.daily.weather_code[ix]};
    }catch(e){}}
    const res=(await Promise.all(proms)).filter(Boolean);
    if(res.length<2){sE(el,'Недостатньо даних.');return}
    const pred=calcP(res,mo,dy,tY);rendPred(pred,fc,ds,el);
  }catch(e){sE(el,'Помилка: '+e.message)}
}

function calcP(res,mo,dy,tY){
  const pad=n=>String(n).padStart(2,'0');
  const gauss=(d,sig)=>Math.exp(-(d*d)/(2*sig*sig));
  const yearly=res.map(({year,data})=>{
    const dl=data.daily,target=`${year}-${pad(mo)}-${pad(dy)}`;
    let wmx=0,wmn=0,wpr=0,wwd=0,tw=0,wdw=0;const days=[];
    for(let i=0;i<dl.time.length;i++){
      const diff=Math.abs(new Date(dl.time[i]+'T00:00')-new Date(target+'T00:00'))/864e5;
      const w=gauss(diff,3);
      if(w>0.01&&dl.temperature_2m_max[i]!=null){tw+=w;wmx+=dl.temperature_2m_max[i]*w;wmn+=dl.temperature_2m_min[i]*w;
        wpr+=(dl.precipitation_sum[i]||0)*w;if(dl.wind_speed_10m_max[i]!=null){wwd+=dl.wind_speed_10m_max[i]*w;wdw+=w;}}
      days.push({date:dl.time[i],tmax:dl.temperature_2m_max[i],tmin:dl.temperature_2m_min[i],precip:dl.precipitation_sum[i],
        off:Math.round((new Date(dl.time[i]+'T00:00')-new Date(target+'T00:00'))/864e5)});}
    if(!tw)return null;
    return{year,tmax:wmx/tw,tmin:wmn/tw,precip:wpr/tw,wind:wdw?wwd/wdw:null,days};
  }).filter(Boolean);
  if(!yearly.length)throw new Error('no data');
  const n=yearly.length;let TW=0,sm=0,sn=0,sp=0,sw=0,sww=0;
  yearly.forEach((d,i)=>{const w=Math.pow(1.5,i);TW+=w;sm+=d.tmax*w;sn+=d.tmin*w;sp+=d.precip*w;
    if(d.wind!=null){sw+=d.wind*w;sww+=w;}});
  const bMx=sm/TW,bMn=sn/TW,bPr=sp/TW,bWd=sww?sw/sww:null;
  const yrs=yearly.map(d=>d.year),tmxA=yearly.map(d=>d.tmax),tmnA=yearly.map(d=>d.tmin),prA=yearly.map(d=>d.precip);
  const trMx=linR(yrs,tmxA),trMn=linR(yrs,tmnA),trPr=linR(yrs,prA);
  const pMx=bMx*0.6+(trMx.s*tY+trMx.i)*0.4;
  const pMn=bMn*0.6+(trMn.s*tY+trMn.i)*0.4;
  const pPr=Math.max(0,bPr*0.6+(trPr.s*tY+trPr.i)*0.4);
  const sdMx=stdev(tmxA),sdMn=stdev(tmnA),avgSd=(sdMx+sdMn)/2;
  let conf;if(avgSd<1.5&&n>=5)conf={t:'Висока',c:'#16a34a'};else if(avgSd<3)conf={t:'Середня',c:'#ca8a04'};else conf={t:'Низька',c:'#dc2626'};
  const rainy=yearly.filter(d=>d.precip>0.5).length,rnProb=Math.round(rainy/n*100);
  let code;if(pPr>8)code=pMx<0?75:65;else if(pPr>3)code=pMx<0?73:63;else if(pPr>.5)code=pMx<0?71:61;else if(pPr>.1)code=3;else code=mo>=5&&mo<=9?1:2;
  return{tmax:r1(pMx),tmin:r1(pMn),precip:r1(pPr),wind:bWd!=null?r1(bWd):null,code,conf,rnProb,
    trend:{mx:r1(trMx.s),mn:r1(trMn.s),pr:r1(trPr.s)},sd:{mx:r1(sdMx),mn:r1(sdMn)},yearly,trMx,trMn,
    range:{mx:[r1(Math.min(...tmxA)),r1(Math.max(...tmxA))],mn:[r1(Math.min(...tmnA)),r1(Math.max(...tmnA))]}};
}

function rendPred(p,fc,ds,el){
  const w=wm(p.code),trI=p.trend.mx>0.1?'📈':p.trend.mx<-0.1?'📉':'➡️',trT=p.trend.mx>0.1?'потепління':p.trend.mx<-0.1?'похолодання':'стабільно';
  let compH='';
  if(fc){const fw=wm(fc.wc);
    compH=`<div class="comp"><h3>📊 Порівняння</h3><div class="comp2">
<div class="cc"><h4>🔮 Наше</h4><div style="font-size:1.8rem">${w.i}</div><div style="font-weight:700">${p.tmax}°/${p.tmin}°</div><div style="font-size:.78rem;color:var(--tx3)">Опади: ${p.precip}мм</div></div>
<div class="cc"><h4>🌐 Прогноз</h4><div style="font-size:1.8rem">${fw.i}</div><div style="font-weight:700">${Math.round(fc.mx)}°/${Math.round(fc.mn)}°</div><div style="font-size:.78rem;color:var(--tx3)">Опади: ${fc.pr}мм</div></div></div></div>`}
  el.innerHTML=`<h3 style="text-align:center;margin-bottom:.8rem">${city.n} · ${fDF(ds)}</h3>
<div class="pmain"><div class="pi">${w.i}</div><div class="pt">${p.tmax}° / ${p.tmin}°</div>
<div class="pd">${w.d}</div><div class="pr">Діапазон: ${p.range.mn[0]}°…${p.range.mx[1]}°</div>
<div class="badge" style="background:${p.conf.c}">Впевненість: ${p.conf.t}</div></div>
<div class="pgrid">
<div class="pg"><h4>🌧️ Опади</h4><p>~${p.precip} мм</p><p>Ймовірність: <b>${p.rnProb}%</b></p></div>
<div class="pg"><h4>${trI} Тренд</h4><p>${trT}</p><p>Макс: ${p.trend.mx>0?'+':''}${p.trend.mx}°/рік</p><p>Мін: ${p.trend.mn>0?'+':''}${p.trend.mn}°/рік</p></div>
<div class="pg"><h4>📊 Розкид</h4><p>σ макс: ±${p.sd.mx}°</p><p>σ мін: ±${p.sd.mn}°</p><p>За ${p.yearly.length} років</p></div>
${p.wind!=null?`<div class="pg"><h4>💨 Вітер</h4><p>~${p.wind} км/г</p></div>`:''}</div>
<div class="cb"><h3>🌡️ По роках</h3><canvas id="py1"></canvas></div>
<div class="cb"><h3>📈 Тренд</h3><canvas id="py2"></canvas></div>
<div class="cb"><h3>🌧️ Опади</h3><canvas id="py3"></canvas></div>
<div class="cb"><h3>📅 ±10 днів</h3><canvas id="py4"></canvas></div>
${compH}
<div class="note">⚠️ Гаусове зважування ±10 днів (σ=3) за 8 років. Експоненціальне зважування років. Ансамбль: 60% середнє + 40% регресія.</div>`;
  const yLb=p.yearly.map(d=>String(d.year)),yrs=p.yearly.map(d=>d.year);
  mc('py1',{type:'bar',data:{labels:yLb,datasets:[
    {label:'Макс',data:p.yearly.map(d=>r1(d.tmax)),backgroundColor:'rgba(239,68,68,.7)',borderRadius:4},
    {label:'Мін',data:p.yearly.map(d=>r1(d.tmin)),backgroundColor:'rgba(59,130,246,.7)',borderRadius:4}
  ]},options:cO()});
  const rMx=yrs.map(y=>r1(p.trMx.s*y+p.trMx.i)),rMn=yrs.map(y=>r1(p.trMn.s*y+p.trMn.i));
  mc('py2',{type:'scatter',data:{datasets:[
    {label:'Макс',data:p.yearly.map(d=>({x:d.year,y:r1(d.tmax)})),backgroundColor:'#ef4444',pointRadius:6},
    {label:'Мін',data:p.yearly.map(d=>({x:d.year,y:r1(d.tmin)})),backgroundColor:'#3b82f6',pointRadius:6},
    {label:'Тренд макс',data:yrs.map((y,i)=>({x:y,y:rMx[i]})),type:'line',borderColor:'#ef4444',borderDash:[5,3],pointRadius:0,fill:false},
    {label:'Тренд мін',data:yrs.map((y,i)=>({x:y,y:rMn[i]})),type:'line',borderColor:'#3b82f6',borderDash:[5,3],pointRadius:0,fill:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}},
    scales:{x:{type:'linear',ticks:{stepSize:1,callback:v=>v,font:{size:9}}},y:{ticks:{font:{size:9}}}}}});
  mc('py3',{type:'bar',data:{labels:yLb,datasets:[
    {label:'мм',data:p.yearly.map(d=>r1(d.precip)),backgroundColor:p.yearly.map(d=>d.precip>5?'rgba(239,68,68,.7)':d.precip>1?'rgba(251,191,36,.7)':'rgba(59,130,246,.5)'),borderRadius:3}
  ]},options:{...cO(),plugins:{legend:{display:false}}}});
  const offs=[];for(let i=-10;i<=10;i++)offs.push(i);
  const clr=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6'];
  mc('py4',{type:'line',data:{labels:offs.map(o=>o===0?'📍':o>0?'+'+o:String(o)),
    datasets:p.yearly.map((yd,ix)=>({label:String(yd.year),
      data:offs.map(o=>{const f=yd.days.find(d=>d.off===o);return f&&f.tmax!=null?r1((f.tmax+f.tmin)/2):null}),
      borderColor:clr[ix%clr.length],tension:.3,pointRadius:1,fill:false,borderWidth:2}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}},
    scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9}}}}}});
}

/* ═══ INIT ═══ */
document.addEventListener('DOMContentLoaded',()=>{
  $('si').value=city.n;
  $('ci').textContent='📍 '+city.r+' · '+city.la.toFixed(2)+'°N '+city.lo.toFixed(2)+'°E';

  initCitySearch();  // ← нова функція з фіксом

  document.querySelectorAll('.tbtn').forEach(b=>b.addEventListener('click',()=>switchT(b.dataset.t)));
  const now=new Date(),w1=new Date(now),w5=new Date(now);
  w1.setDate(w1.getDate()-7);w5.setDate(w5.getDate()-37);
  $('hS').value=iso(w5);$('hE').value=iso(w1);
  const m1=new Date(now);m1.setDate(m1.getDate()+30);$('pD').value=iso(m1);
  loadCur();
});
</script>
